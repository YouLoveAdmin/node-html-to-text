name: test

on: [push, pull_request]

jobs:
  test:
    name: Run tests

    strategy:
      matrix:
        node-version: [18.x, 20.x]
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Create placeholder CLI file
        run: node -e "const fs=require('fs'); fs.mkdirSync('packages/html-to-text-cli/bin',{recursive:true}); fs.writeFileSync('packages/html-to-text-cli/bin/cli.js','// placeholder\\n');"

      - run: npm ci

      - run: npm test
