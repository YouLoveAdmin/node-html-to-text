name: lint

on: [push, pull_request]

jobs:
  lint:
    name: Run linters

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Create placeholder CLI file
        run: node -e "const fs=require('fs'); fs.mkdirSync('packages/html-to-text-cli/bin',{recursive:true}); fs.writeFileSync('packages/html-to-text-cli/bin/cli.js','// placeholder\\n');"

      - run: npm ci

      - run: npm run lint
